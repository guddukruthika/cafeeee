<!DOCTYPE html>
<html>
<head>
    <title>Cafe Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="glass">
        <h1>Welcome to Cafe ☕</h1>
        <p>International Cafe Shop</p>
        <button class="btn">Order Now</button>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products hidden">
    <h2>Our Special Drinks</h2>

    <div class="container">

        <div class="card">
            <img src="coffee1.jpg.jpg">
            <h3>Cold Coffee</h3>
        </div>

        <div class="card">
            <img src="coffee2.jpg.jpg">
            <h3>Cappuccino</h3>
        </div>

        <div class="card">
            <img src="coffee3.jpg.jpg">
            <h3>Espresso</h3>
        </div>

    </div>
</section>

<!-- ABOUT -->
<section class="about hidden">
    <h2>About Us</h2>
    <p>
        We are a modern cafe startup providing high-quality coffee 
        and a relaxing atmosphere. Our goal is to deliver the best 
        coffee experience with style and comfort.
    </p>
</section>

<script src="script.js"></script>

</body>
</html>
